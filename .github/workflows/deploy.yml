name: Deploy To-Do App to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Code von GitHub auschecken
      uses: actions/checkout@v3

    - name: SSH-Schlüssel und Host konfigurieren
      run: |
        mkdir -p ~/.ssh
        # Holt den privaten Schlüssel aus den GitHub Secrets
        echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Holt die Server-IP aus den Secrets, damit die Verbindung vertrauenswürdig ist
        ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

    - name: Befehle auf AWS ausführen
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
      run: |
        # Nutzt die Secrets für den eigentlichen Login-Befehl
        ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.SERVER_IP }} << 'EOF'
          # 1. In den Projektordner wechseln
          cd to-do-liste || exit
          
          # 2. Den neuesten Code von GitHub ziehen
          git pull origin main
          
          # 3. Alten Container stoppen und löschen
          docker rm -f mein-todo-container || true
          
          # 4. Das Docker-Image frisch ohne Cache neu bauen
          docker build --no-cache -t todo-devops-app .
          
          # 5. Den Container auf Port 80 neu starten (ggf. auf :3000 ändern, falls nötig)
          docker run -d -p 80:8000 --name mein-todo-container todo-devops-app
        EOF