name: Deploy To-Do App to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Code von GitHub auschecken
      uses: actions/checkout@v3

    - name: SSH-Schlüssel konfigurieren
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Fügt den AWS-Server zu den bekannten Hosts hinzu, damit die Verbindung nicht blockiert wird
        ssh-keyscan -H 3.64.217.19 >> ~/.ssh/known_hosts

    - name: Befehle auf AWS ausführen
      run: |
        ssh -i ~/.ssh/id_rsa ec2-user@3.64.217.19 << 'EOF'
          # 1. In den Projektordner wechseln
          cd to-do-liste || exit
          
          # 2. Den neuesten Code von GitHub ziehen
          git pull origin main
          
          # 3. Alten Container stoppen und löschen
          docker rm -f mein-todo-container || true
          
          # 4. Das Docker-Image frisch ohne Cache neu bauen
          docker build --no-cache -t todo-devops-app .
          
          # 5. Den Container auf Port 80 neu starten
          docker run -d -p 80:8000 --name mein-todo-container todo-devops-app
        EOF