<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine DevOps To-Do Liste</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="todo-container">
        <h1>To-Do Liste</h1>
        
        <form action="/add" method="post" class="input-group">
            <input type="text" name="titel" placeholder="Neue Aufgabe..." required>
            <button type="submit">Hinzufügen</button>
        </form>

        <ul>
            {% for item in todos %}
            <li>
                <span>{{ item.titel }}</span>
                <form action="/delete/{{ item.id }}" method="post" style="display:inline;">
                    <button type="submit" class="delete-btn">X</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
